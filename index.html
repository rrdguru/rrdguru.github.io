<script>

let chartsInitialized = false;

function switchView(viewName) {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + viewName).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });

    if(viewName === 'teaching' && !chartsInitialized){
        initCharts();
        chartsInitialized = true;
    }
}

function initCharts(){

    const trajectoryCtx = document.getElementById('trajectoryChart').getContext('2d');

    new Chart(trajectoryCtx,{
        type:'line',
        data:{
            labels:["Geneva","HSE Moscow","IIM Bodhgaya","IIM Ranchi"],
            datasets:[{
                label:"Average Teaching Score",
                data:[3.58,3.56,4.77,4.36],
                borderColor:"#4a90e2",
                backgroundColor:"rgba(74,144,226,0.2)",
                tension:0.4,
                pointRadius:6
            }]
        },
        options:{
            responsive:true,
            plugins:{legend:{display:false}},
            scales:{y:{min:3,max:5}}
        }
    });

    const scatterCtx = document.getElementById('scatterChart').getContext('2d');

    new Chart(scatterCtx,{
        type:'bubble',
        data:{
            datasets:[
                {
                    label:"HSE Moscow",
                    data:[{x:4.06,y:4.21,r:12}],
                    backgroundColor:"#f59e0b"
                },
                {
                    label:"IIM Bodhgaya",
                    data:[{x:4.5,y:4.77,r:18}],
                    backgroundColor:"#10b981"
                },
                {
                    label:"IIM Ranchi",
                    data:[{x:4.2,y:4.36,r:16}],
                    backgroundColor:"#4a90e2"
                }
            ]
        },
        options:{
            responsive:true,
            plugins:{legend:{position:"bottom"}},
            scales:{
                x:{title:{display:true,text:"Perceived Difficulty"}},
                y:{title:{display:true,text:"Student Satisfaction"}}
            }
        }
    });
}

const courseData = {
    ranchi:{
        title:"Marketing Management (IIM Ranchi)",
        rating:"4.36 / 5",
        insight:"Highly discussion-driven classroom emphasizing analytical reasoning and strategic thinking.",
        quotes:[
            "For the first time I felt I was sitting in an IIM level discussion.",
            "The course changed how I approach marketing problems.",
            "Strict classroom discipline but extremely rewarding."
        ]
    },

    bodhgaya:{
        title:"Brand / Product / Marketing (IIM Bodhgaya)",
        rating:"Peak 4.97 / 5",
        insight:"Concept-driven courses using real world cases and structured thinking.",
        quotes:[
            "This subject made me think rather than memorize.",
            "Examples like Coca Cola positioning clarified the frameworks.",
            "One of the most intellectually engaging courses."
        ]
    },

    hse:{
        title:"R & Python Analytics (HSE Moscow)",
        rating:"Novelty score 4.21",
        insight:"Highly technical course combining programming and statistical modelling.",
        quotes:[
            "The course was difficult but extremely valuable.",
            "Learned practical data analysis skills."
        ]
    },

    geneva:{
        title:"Teaching Assistant Phase (Geneva)",
        rating:"3.58 / 4",
        insight:"Focus on student support, availability and conceptual clarification.",
        quotes:[
            "Always available and patient.",
            "Encourages deeper understanding beyond lectures."
        ]
    }
};

const menu = document.getElementById('courseMenu');

Object.keys(courseData).forEach(key=>{
    const btn=document.createElement("button");
    btn.textContent=courseData[key].title;
    btn.onclick=()=>showCourse(key,btn);
    menu.appendChild(btn);
});

function showCourse(key,btn){
    document.querySelectorAll('.course-menu button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const c=courseData[key];

    document.getElementById("cTitle").textContent=c.title;
    document.getElementById("cRating").textContent=c.rating;
    document.getElementById("cInsight").textContent=c.insight;

    let html="";
    c.quotes.forEach(q=>{
        html+=`<div class="verbatim">${q}</div>`;
    });

    document.getElementById("cQuotes").innerHTML=html;
}

showCourse('ranchi',menu.firstChild);

</script>
